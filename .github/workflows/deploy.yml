name: Deploy v2 to Azure Container Apps

on:
  push:
    branches:
      - master
    paths:
      - "backend/**"
      - "frontend/**"
      - "infra/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:
    inputs:
      target:
        description: "What to deploy"
        required: true
        default: "both"
        type: choice
        options: [both, backend, frontend]

permissions:
  id-token: write      # OIDC token for azure/login
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  RESOURCE_GROUP: ${{ vars.AZURE_RG }}
  ACR_NAME: ${{ vars.AZURE_ACR }}
  BACKEND_APP: ${{ vars.BACKEND_APP }}
  FRONTEND_APP: ${{ vars.FRONTEND_APP }}

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'infra/**'
              - '.github/workflows/deploy.yml'
            frontend:
              - 'frontend/**'
              - 'infra/**'
              - '.github/workflows/deploy.yml'

  backend:
    needs: changes
    if: |
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.target == 'both' || github.event.inputs.target == 'backend'))
      || (github.event_name == 'push' && needs.changes.outputs.backend == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build backend image in ACR
        id: build
        run: |
          IMAGE_TAG="v$(date -u +%Y%m%d%H%M%S)-${GITHUB_SHA::7}"
          echo "tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"
          az acr build \
            --registry "$ACR_NAME" \
            --image "norsk-nettverk-v2-backend:$IMAGE_TAG" \
            --image "norsk-nettverk-v2-backend:latest" \
            --file backend/Dockerfile \
            backend/

      - name: Update backend Container App
        run: |
          az containerapp update \
            --resource-group "$RESOURCE_GROUP" \
            --name "$BACKEND_APP" \
            --image "${ACR_NAME}.azurecr.io/norsk-nettverk-v2-backend:${{ steps.build.outputs.tag }}" \
            --revision-suffix "${{ steps.build.outputs.tag }}" \
            --output none

      - name: Update refresh job image
        # The daily refresh job runs the same backend image but with a
        # different entrypoint (node dist/jobs/refresh.js). Roll it forward
        # together with the API so the scheduled run picks up new code.
        run: |
          az containerapp job update \
            --resource-group "$RESOURCE_GROUP" \
            --name norsk-nettverk-v2-refresh-job \
            --image "${ACR_NAME}.azurecr.io/norsk-nettverk-v2-backend:${{ steps.build.outputs.tag }}" \
            --output none

      - name: Show backend revision
        run: |
          az containerapp revision list \
            --resource-group "$RESOURCE_GROUP" \
            --name "$BACKEND_APP" \
            --query "[?properties.active].{name:name, active:properties.active, createdTime:properties.createdTime}" \
            -o table

  frontend:
    needs: changes
    if: |
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.target == 'both' || github.event.inputs.target == 'frontend'))
      || (github.event_name == 'push' && needs.changes.outputs.frontend == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build frontend image in ACR
        id: build
        run: |
          IMAGE_TAG="v$(date -u +%Y%m%d%H%M%S)-${GITHUB_SHA::7}"
          echo "tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"
          az acr build \
            --registry "$ACR_NAME" \
            --image "norsk-nettverk-v2-frontend:$IMAGE_TAG" \
            --image "norsk-nettverk-v2-frontend:latest" \
            --file frontend/Dockerfile \
            frontend/

      - name: Update frontend Container App
        run: |
          az containerapp update \
            --resource-group "$RESOURCE_GROUP" \
            --name "$FRONTEND_APP" \
            --image "${ACR_NAME}.azurecr.io/norsk-nettverk-v2-frontend:${{ steps.build.outputs.tag }}" \
            --revision-suffix "${{ steps.build.outputs.tag }}" \
            --output none

      - name: Smoke test public URL
        run: |
          URL="${{ vars.FRONTEND_URL }}"
          echo "Hitting $URL/dashboard ..."
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL/dashboard" || echo "000")
            echo "Attempt $i: status=$STATUS"
            if [ "$STATUS" = "200" ]; then
              exit 0
            fi
            sleep 10
          done
          echo "Smoke test failed: status=$STATUS"
          exit 1
